{% load i18n %}
{# Adds `_link_field` suffix class and default `hidden` class to all fields except link_to. #}
<div class="{{ classname }}">
  {% if help_text %}
    <span>
      <div class="help">
        <span class="icon-help-inverse" aria-hidden="true"></span>
        {{ help_text }}
      </div>
    </span>
  {% endif %}

  {% for child in children.values %}
    <div class="field
                     {% if child.block.required %}required{% endif %}
                     {% if child.block.name != 'link_to' %}
                       {{ child.block.name }}_link_field link-block__hidden
                     {% endif %}
                     ">
      {% if child.block.label %}
        <label class="w-field__label" {% if child.id_for_label %}for="{{ child.id_for_label }}"{% endif %}>{{ child.block.label }}
          {% if child.block.required or child.block.name != 'link_to' and child.block.name != 'new_window' %}
            <span class="w-required-mark">*</span>
          {% endif %}
        </label>
      {% endif %}
      {{ child.render_form }}
    </div>
  {% endfor %}
</div>
